<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Password Generator</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <h1>Password Generator</h1>
        
        <div class="password-box">
            <input type="text" id="passwordDisplay" class="password-input">
            <button class="copy-btn" id="copyBtn">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <path d="M16 4h2a2 2 0 0 1 2 2v14a2 2 0 0 1-2 2H6a2 2 0 0 1-2-2V6a2 2 0 0 1 2-2h2"></path>
                    <rect x="8" y="2" width="8" height="4" rx="1" ry="1"></rect>
                </svg>
            </button>
        </div>

        <div class="slider-container">
            <input type="range" id="lengthSlider" min="4" max="32" value="8" class="slider">
            <div class="length-display">
                <label>Password Length</label>
                <span id="lengthValue">8</span>
            </div>
        </div>

        <div class="options">
            <label class="checkbox-label">
                <input type="checkbox" id="lowercase" checked>
                <span>Include Lowercase Letters (a-z)</span>
            </label>

            <label class="checkbox-label">
                <input type="checkbox" id="uppercase" checked>
                <span>Include Uppercase Letters (A-Z)</span>
            </label>

            <label class="checkbox-label">
                <input type="checkbox" id="numbers" checked>
                <span>Include Numbers (0-9)</span>
            </label>

            <label class="checkbox-label">
                <input type="checkbox" id="symbols" checked>
                <span>Include Symbols (@-*)</span>
            </label>
        </div>

        <button class="generate-btn" id="generateBtn">Generate Password</button>
    </div>

    <script src="script.js"></script>
</body>
</html>
